name: IT Monitoring Watcher

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00 → JST 09:00
    - cron: '0 7 * * *'  # UTC 07:00 → JST 16:00

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      # 1. コードをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      # 2. Python 環境をセットアップ
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 必要ライブラリをインストール
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 playwright
          python -m playwright install --with-deps chromium

      # 4. docs フォルダを用意
      - name: Prepare docs folder
        run: |
          mkdir -p docs

      # 5. スクリプトを実行して docs/index.md に書き出し
      - name: Run IT_monitoring.py and save page
        run: |
          python ./IT_monitoring.py > docs/index.md 2>&1

      # 6. docs/index.md をコミット＆プッシュ
      - name: Commit & push page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/index.md

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update IT monitoring page"
            git pull --rebase --autostash origin ${{ github.ref_name }}
            git push
          fi
